{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-flask-app
spec:
  podSelector:
    matchLabels:
      {{- include "flask-app.labels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 5000
  egress:
    - ports:
        - port: 53
          protocol: UDP
{{- end }}
